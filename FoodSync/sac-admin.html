<main class="content">


<header class="top-header">

<h1>
🎧 Atendimento SAC
</h1>

<p>
Gerenciamento de chamados
</p>

</header>



<section class="table-box">


<h2>
Chamados recebidos
</h2>



<table>


<thead>

<tr>

<th>
Data
</th>

<th>
Tipo
</th>

<th>
Assunto
</th>

<th>
Prioridade
</th>

<th>
Status
</th>

<th>
Ação
</th>


</tr>

</thead>


<tbody id="listaSACAdmin">


<tr>

<td colspan="6">
Carregando...
</td>

</tr>


</tbody>


</table>


</section>



</main>


</div>


<!-- MODAL ATENDIMENTO SAC -->

<div id="modalSAC" class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h2>
            🎧 Atendimento SAC
            </h2>

            <button onclick="fecharModalSAC()">
            ✖
            </button>

        </div>


        <div id="dadosChamado"></div>


        <div class="campo">

            <label>
            Resposta do suporte
            </label>

            <textarea 
            id="respostaSAC"
            rows="5">
            </textarea>

        </div>


        <div class="campo">

            <label>Status</label>

            <select id="statusSAC">

                <option value="Aberto">
                Aberto
                </option>

                <option value="Em análise">
                Em análise
                </option>

                <option value="Resolvido">
                Resolvido
                </option>

            </select>

        </div>


        <button
        class="btn-primary"
        onclick="salvarAtendimentoSAC()">

        💾 Salvar atendimento

        </button>


    </div>

</div>


<!-- SCRIPTS NO FINAL -->
