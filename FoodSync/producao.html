<!-- CONTEÚDO PRINCIPAL -->


<main class="content">


<header class="top-header">


<div>

<h1>

🍱 Produção

</h1>

<p>

<p>
Controle de produção e validade
</p>
</p>


</div>


</header>


<!-- ÁREA DE PRODUÇÃO -->

<section class="form-box">


<h2>
Nova Produção
</h2>



<form id="producaoForm">


<div class="form-grid">



<div class="input-group">

<label>
Produto
</label>


<select id="produtoSelect">

<option value="">
Selecione o produto
</option>

</select>


</div>



<div class="input-group">

<label>
Quantidade
</label>

<input 
type="number"
id="quantidadeProducao"
value="1">

</div>


<div class="input-group">

<label>
Unidade
</label>

<select id="unidadeProducao">

<option value="UN">
UN
</option>

<option value="KG">
KG
</option>

<option value="G">
G
</option>

<option value="L">
L
</option>

<option value="ML">
ML
</option>

</select>

</div>



<!-- NOVOS CAMPOS -->

<div class="input-group">

<label>
Data Produção
</label>

<input 
type="date"
id="dataProducao">

</div>


<div class="input-group">

<label>
Validade
</label>

<input 
type="date"
id="validadeProducao"
readonly>

</div>


<div class="input-group">

<label>
Temperatura
</label>

<input 
type="text"
id="temperaturaProducao"
readonly>

</div>


<!-- RESPONSÁVEL -->

<div class="input-group">

<label>
Responsável
</label>

<input
type="text"
id="responsavelProducao"
value="admin">

</div>




<div class="input-group">

<label>
Status
</label>


<select id="statusProducao">


<option value="Finalizado">
Finalizado
</option>


<option value="Em produção">
Em produção
</option>


</select>


</div>



</div>



<button 
type="submit"
class="btn-primary">


💾 Registrar Produção


</button>



</form>


</section>




<!-- LISTA DE PRODUÇÕES -->

<section class="table-box">


<h2>

Produções realizadas

</h2>



<table>

<thead>

<tr>

<th>
Produto
</th>

<th>
Quantidade
</th>

<th>
Data Produção
</th>

<th>
Validade
</th>

<th>
Status
</th>

<th>
Ações
</th>

</tr>

</thead>



<tbody id="listaProducoes">


<tr>

<td colspan="6">

Nenhuma produção registrada

</td>

</tr>


</tbody>



</table>


</section>
