<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/sidebar.css">

<link rel="stylesheet" href="css/formulario.css">

<link rel="stylesheet" href="css/etiquetas.css">


</head>



<body>


<div class="layout">



<!-- SIDEBAR -->

<aside class="sidebar">


<div class="logo-area">

<img src="img/logo.png">

</div>



<nav class="menu">


<a href="dashboard.html">
📊 Dashboard
</a>


<a href="producao.html">
🍱 Produção
</a>


<a href="produtos.html">
📦 Produtos
</a>


<a href="etiquetas.html" class="active">
🏷️ Etiquetas
</a>


<a href="estoque.html">

📈 Relatórios
</a>


<a href="usuario.html">
👤 Usuários
</a>


<a href="configuracoes.html">
⚙️ Configurações
</a>



</nav>



<div class="sidebar-footer">

<button onclick="logout()">

🚪 Sair

</button>

</div>


</aside>







<!-- CONTEÚDO -->

<main class="content">



<header class="top-header">


<div>


<h1>
Etiquetas
</h1>


<p>
Controle de validade e identificação dos produtos
</p>


</div>


</header>






<section class="form-box">


<h2>
Gerar nova etiqueta
</h2>




<form id="etiquetaForm">



<div class="form-grid">



<div class="input-group">

<label>
Produto
</label>


<select id="produtoEtiqueta">

<option>
Carregando produtos...
</option>


</select>


</div>






<div class="input-group">


<label>
Data Produção
</label>


<input 
type="date"
id="dataProducao"
required>


</div>






<div class="input-group">


<label>
Quantidade
</label>


<input 
type="number"
id="quantidadeEtiqueta"
value="1">


</div>





</div>





<button type="submit">

Gerar Etiqueta

</button>



</form>



</section>








<section class="etiqueta-preview">


<h2>
Pré-visualização
</h2>



<div id="etiquetaGerada" class="etiqueta">


<div class="etiqueta-logo">
Controle de Validade
</div>


<h3 id="nomeEtiqueta">
Produto
</h3>


<p id="temperaturaEtiqueta">
TEMP.
</p>


<p>
MANIPULAÇÃO:
<span id="dataEtiqueta">
--
</span>
</p>


<p>
VALIDADE:
<span id="validadeEtiqueta">
--
</span>
</p>


<p>
RESP.:
<span id="responsavelEtiqueta">
--
</span>
</p>


<div id="qrcodeEtiqueta"></div>


</div>


<button 
onclick="imprimirEtiqueta()">

🖨️ Imprimir

</button>



</section>





</main>


</div>






<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/app.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module" src="js/etiquetas.js"></script>

<script type="module" src="js/auth.js"></script>


</body>

</html>
