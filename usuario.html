<main class="content">



<header class="top-header">


<div>


<h1>
👤 Usuários
</h1>


<p>
Controle de usuários e permissões do FoodSync
</p>


</div>


</header>







<section class="form-box">


<h2>
Novo Usuário
</h2>




<form id="usuarioForm">



<div class="form-grid">






<div class="input-group">

<label>
Nome
</label>


<input

type="text"

id="nomeUsuario"

placeholder="Nome do usuário"

required>


</div>








<div class="input-group">

<label>
E-mail
</label>


<input

type="email"

id="emailUsuario"

placeholder="usuario@email.com"

required>


</div>








<div class="input-group">

<label>
Perfil de Acesso
</label>


<select id="perfilUsuario">


<option value="Administrador">

👑 Administrador

</option>


<option value="Operador">

🍱 Operador

</option>


<option value="Consulta">

👀 Consulta

</option>


</select>


</div>








<div class="input-group">

<label>
Status
</label>


<select id="statusUsuario">


<option value="ativo">

🟢 Ativo

</option>


<option value="inativo">

🔴 Inativo

</option>


</select>


</div>





</div>






<button type="submit">

💾 Salvar Usuário

</button>





</form>



</section>









<section class="table-box">


<h2>
📋 Usuários Cadastrados
</h2>





<table>


<thead>


<tr>


<th>
Nome
</th>


<th>
E-mail
</th>


<th>
Perfil
</th>


<th>
Status
</th>


<th>
Criado em
</th>


<th>
Ação
</th>


</tr>


</thead>







<tbody id="listaUsuarios">


<tr>


<td colspan="6">


Nenhum usuário cadastrado


</td>


</tr>


</tbody>





</table>


</section>







</main>


</div>
