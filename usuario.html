<link rel="stylesheet" href="css/tabela.css">


</head>



<body>


<div class="layout">



<aside class="sidebar">


<div class="logo-area">

<img src="img/logo.png">

</div>





<nav class="menu">

📊 Dashboard
</a>

</nav>




<div class="sidebar-footer">


<button onclick="logout()">

🚪 Sair

</button>


</div>


</aside>









<main class="content">



<header class="top-header">


<div>


<h1>
Usuários
</h1>


<p>
Controle de acesso ao sistema
</p>


</div>


</header>








<section class="form-box">


<h2>
Novo Usuário
</h2>




<form id="usuarioForm">



<div class="form-grid">





<div class="input-group">

<label>
Nome
</label>


<input 
type="text"
id="nomeUsuario"
required>

</div>







<div class="input-group">

<label>
E-mail
</label>


<input 
type="email"
id="emailUsuario"
required>

</div>







<div class="input-group">

<label>
Perfil
</label>


<select id="perfilUsuario">


<option>
Administrador
</option>


<option>
Produção
</option>


<option>
Estoque
</option>


<option>
Visualização
</option>


</select>


</div>







<div class="input-group">

<label>
Status
</label>


<select id="statusUsuario">


<option value="ativo">
Ativo
</option>


<option value="inativo">
Inativo
</option>


</select>


</div>




</div>







<button type="submit">

Salvar Usuário

</button>




</form>



</section>








<section class="table-box">


<h2>
Usuários cadastrados
</h2>




<table>


<thead>


<tr>


<th>
Nome
</th>


<th>
E-mail
</th>


<th>
Perfil
</th>


<th>
Status
</th>


<th>
Ação
</th>


</tr>


</thead>





<tbody id="listaUsuarios">


<tr>

<td colspan="5">

Nenhum usuário cadastrado

</td>


</tr>


</tbody>





</table>


</section>






</main>


</div>








<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/app.js"></script>

<script type="module" src="js/usuarios.js"></script>

<script type="module" src="js/auth.js"></script>



</body>

</html>
