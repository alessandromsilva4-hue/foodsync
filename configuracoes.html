<header class="top-header">


<div>


<h1>
Configurações
</h1>


<p>
Configurações gerais do sistema
</p>


</div>


</header>








<section class="form-box">


<h2>
Configurações Gerais
</h2>




<form id="configForm">





<div class="form-grid">





<div class="input-group">


<label>
Nome do Sistema
</label>

<input
type="text"
id="nomeSistema"
value="FoodSync">


</div>







<div class="input-group">


<label>
Tamanho da Etiqueta
</label>


<select id="tamanhoEtiqueta">

<option>
60x60 mm
</option>

<option>
80x50 mm
</option>

<option>
100x50 mm
</option>

<option>
Personalizado
</option>

</select>


</div>







<div class="input-group">


<label>
Validade Padrão (dias)
</label>


<input

type="number"

id="validadePadrao"

value="1">


</div>







<div class="input-group">


<label>
Impressora
</label>


<input

type="text"

id="impressora"

placeholder="Nome da impressora">


</div>

<div class="input-group">

<label>
QR Code
</label>

<select id="qrCode">

<option value="sim">
Ativado
</option>

<option value="nao">
Desativado
</option>

</select>

</div>




</div>








<button type="submit">

Salvar Configurações

</button>






</form>
