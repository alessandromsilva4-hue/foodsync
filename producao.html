<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>FoodSync - Produção</title>


<link rel="icon" href="img/favicon.png">


<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/sidebar.css">

<link rel="stylesheet" href="css/formulario.css">

<link rel="stylesheet" href="css/tabela.css">


</head>



<body>


<div class="layout">



<aside class="sidebar">


<div class="logo-area">

<img src="img/logo.png">

</div>




<nav class="menu">


<a href="dashboard.html">
📊 Dashboard
</a>


<a href="producao.html" class="active">
🍱 Produção
</a>


<a href="produtos.html">
📦 Produtos
</a>


<a href="etiquetas.html">
🏷️ Etiquetas
</a>


<a href="estoque.html">
📋 Estoque
</a>


<a href="relatorios.html">
📈 Relatórios
</a>


<a href="usuario.html">
👤 Usuários
</a>


<a href="configuracoes.html">
⚙️ Configurações
</a>


</nav>




<div class="sidebar-footer">

<button onclick="logout()">

🚪 Sair

</button>

</div>



</aside>








<main class="content">



<header class="top-header">


<div>


<h1>
Produção
</h1>


<p>
Controle diário de produção
</p>


</div>


</header>








<section class="form-box">


<h2>
Nova Produção
</h2>




<form id="producaoForm">



<div class="form-grid">






<div class="input-group">


<label>
Produto
</label>



<select id="produtoProducao">


<option>
Carregando produtos...
</option>


</select>



</div>







<div class="input-group">


<label>
Quantidade Produzida
</label>


<input

type="number"

id="quantidadeProducao"

value="1"

required>


</div>








<div class="input-group">


<label>
Responsável
</label>


<input

type="text"

id="responsavelProducao"

placeholder="Nome">


</div>







<div class="input-group">


<label>
Status
</label>


<select id="statusProducao">


<option>
Produzindo
</option>


<option>
Finalizado
</option>


</select>



</div>






</div>






<button type="submit">

Registrar Produção

</button>




</form>



</section>









<section class="table-box">


<h2>
Produções Registradas
</h2>




<table>


<thead>

<tr>


<th>
Produto
</th>


<th>
Quantidade
</th>


<th>
Responsável
</th>


<th>
Data
</th>


<th>
Status
</th>


</tr>


</thead>



<tbody id="listaProducao">


<tr>

<td colspan="5">

Nenhuma produção registrada

</td>

</tr>


</tbody>



</table>



</section>







</main>



</div>







<script type="module" src="js/firebase.js"></script>

<script src="js/app.js"></script>

<script type="module" src="js/producao.js"></script>

<script type="module" src="js/auth.js"></script>



</body>

</html>
